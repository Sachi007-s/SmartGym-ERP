<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartGym ERP - Dashboard</title>
    <!-- CSS ෆයිල් එක එකම ෆෝල්ඩරයේ ඇති නිසා කෙලින්ම ලින්ක් කලා -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- වම් පැත්තේ Sidebar එක -->
<div class="sidebar">
    <h2>SmartGym ERP</h2>
    <ul>
        <li><a href="#" class="active">🏋️‍♂️ Dashboard</a></li>
        <li><a href="#">👥 Members</a></li>
        <li><a href="#">📦 Packages</a></li>
        <li><a href="#">📅 Attendance</a></li>
        <li><a href="#">💳 Billing</a></li>
    </ul>
</div>

<!-- ප්‍රධාන පිටුවේ විස්තර (Main Content) -->
<div class="main-content">
    <div class="header">
        <h1>Welcome to SmartGym Dashboard</h1>
        <p>Manage your gym operations efficiently.</p>
    </div>

    <!-- Dashboard Cards 4 (Modules 4 වෙනුවෙන්) -->
    <div class="dashboard-cards">
        <div class="card">
            <h3>Total Members</h3>
            <p class="number">120</p>
        </div>
        <div class="card">
            <h3>Active Packages</h3>
            <p class="number">4</p>
        </div>
        <div class="card">
            <h3>Today's Attendance</h3>
            <p class="number">35</p>
        </div>
        <div class="card">
            <h3>Monthly Earnings</h3>
            <p class="number">Rs. 85,000</p>
        </div>
    </div>
</div>

</body>
</html>
